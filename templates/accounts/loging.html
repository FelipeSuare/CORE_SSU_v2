{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio de Sesión</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,400,0,0" rel="stylesheet">
<link rel="stylesheet" href="{% static 'css/accounts/miestilo.css' %}">
    <link rel="stylesheet" href="{% static 'css/shared/notifications.css' %}">
</head>
<body>
    <div class="container">
        <div class="left-panel">
            <img src="{% static 'img/login/LOGOSSU.png' %}" alt="Logo" class="logo">
            <h1>¡¡Bienvenido nuevamente!!</h1>
            <p>Por favor Inicia Sesión con tus datos</p>
        </div>

        <div class="right-panel">
            <h2>Iniciar Sesión</h2>
            {% if messages %}
            <div class="messages" style="color: red; margin-bottom: 15px; text-align: center;">
                {% for message in messages %}
                <p>{{ message }}</p>
                {% endfor %}
            </div>
            {% endif %}
            <form method="POST" action="{% url 'login_home' %}">
                {% csrf_token %}
        <div class="input-group">
            <span class="icon"><i class="material-symbols-outlined">person</i></span>
            <input type="text" name="username" placeholder="Usuario" required>
        </div> 


                <div class="input-group">
                    <span class="icon"><i class="material-symbols-outlined">lock</i></span>
                    <input type="password" name="password" id="passwordInput" placeholder="Contraseña" required>
                    <button type="button" id="togglePassword"
                            style="background:none;border:none;cursor:pointer;padding:0;margin-left:6px;color:rgb(114,0,53);display:flex;align-items:center;"
                            onclick="togglePasswordVisibility()">
                        <i class="material-symbols-outlined" id="toggleIcon" style="font-size:20px">visibility_off</i>
                    </button>
                </div>

                <button type="submit">Iniciar Sesión</button>
            </form>
            <a href="/Recuperar.html"
               style="display:block;text-align:center;margin-top:14px;font-size:0.82em;
                      color:rgb(114,0,53);text-decoration:none;font-family:'Montserrat',sans-serif;
                      transition:color 0.2s;"
               onmouseover="this.style.color='rgb(39,20,71)'"
               onmouseout="this.style.color='rgb(114,0,53)'">
                ¿Olvidaste tu contraseña?
            </a>
        </div>
    </div>
    <script src="{% static 'js/accounts/movimiento.js' %}"></script>
    <script src="{% static 'js/shared/notifications.js' %}"></script>
    <script>
        function togglePasswordVisibility() {
            const input = document.getElementById('passwordInput');
            const icon  = document.getElementById('toggleIcon');
            if (input.type === 'password') {
                input.type = 'text';
                icon.textContent = 'visibility';
            } else {
                input.type = 'password';
                icon.textContent = 'visibility_off';
            }
        }
    </script>
</body>
</html>
