{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="csrf-token" content="{{ csrf_token }}">
    <title>Historial de Cargos Anteriores</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,400,0,0" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/shared/base.css' %}">
    <link rel="stylesheet" href="{% static 'css/shared/utils.css' %}">
    <link rel="stylesheet" href="{% static 'css/shared/profile-switcher.css' %}">
    <link rel="stylesheet" href="{% static 'css/employees/HistorialCargos.css' %}">
    <link rel="stylesheet" href="{% static 'css/shared/notifications.css' %}">
</head>
<body>

    <div class="main-container">

        <div class="hist-header-wrapper">
            <header class="module-header">
                <i class="material-symbols-outlined">work</i>
                <div>
                    <h1 class="module-title">Historial de Cargos Anteriores</h1>
                    <p class="module-subtitle">Trayectoria laboral completa del funcionario</p>
                </div>
            </header>
            <div class="hist-header-actions">
                <a href="/Index_Principal.html" class="back-to-menu">
                    <i class="material-symbols-outlined">arrow_back</i>
                    Volver
                </a>
                <div class="profile-switcher-container">
                    <button class="btn-profile-trigger" id="btnProfile">
                        <i class="material-symbols-outlined">account_circle</i>
                        <span id="currentProfileText">—</span>
                        <i class="material-symbols-outlined">expand_more</i>
                    </button>
                    <div class="profile-panel" id="profilePanel">
                        <div class="profile-info">
                            <i class="material-symbols-outlined profile-icon">account_circle</i>
                            <div class="profile-text">
                                <span class="profile-name" id="profileNamePanel">—</span>
                                <span class="profile-role" id="currentRolePanel">—</span>
                            </div>
                        </div>
                        <ul class="role-list" id="roleList"></ul>
                    </div>
                </div>
            </div>
        </div>

        <div class="filtros-card">
            <div class="filtro-grupo" style="flex:2; min-width:280px;">
                <label class="filtro-label"><i class="material-symbols-outlined">person</i> Buscar Funcionario por Nombre</label>
                <div class="search-box" style="position:relative;">
                    <input type="text" id="searchFuncionario" placeholder="Escribir nombre del funcionario..." autocomplete="off">
                    <button class="btn-search" onclick="buscarFuncionarioManual()"><i class="material-symbols-outlined">search</i></button>
                    <div id="sugerenciasDropdown" class="sugerencias-dropdown" style="display:none"></div>
                </div>
            </div>
            <div class="filtro-grupo filtro-btn">
                <button class="btn btn-limpiar" onclick="limpiarFiltros()">
                    <i class="material-symbols-outlined">close</i> Limpiar
                </button>
            </div>
        </div>

        <div class="table-card" id="tableCard" style="display:none">
            <div class="funcionario-banner" id="funcionarioBanner"></div>
            <div class="table-card-header">
                <div class="card-left">
                    <div class="card-title-block">
                        <h2 class="card-title">Historial de Cargos</h2>
                        <span class="card-subtitle" id="subtituloResumen"></span>
                    </div>
                </div>
                <div class="card-right">
                    <button class="btn btn-download" onclick="generarPlanillaPDF()">
                        <i class="material-symbols-outlined">picture_as_pdf</i> Exportar PDF
                    </button>
                </div>
            </div>
            <div id="cargosContainer" style="padding: 0 14px 20px;"></div>
        </div>

        <div class="placeholder-card" id="placeholderCard">
            <i class="material-symbols-outlined">person</i>
            <p>Seleccioná un funcionario para ver su historial de cargos</p>
        </div>

    </div>
    <script src="{% static 'js/shared/profile-switcher.js' %}"></script>
    <script src="{% static 'js/employees/HistorialCargos.js' %}"></script>
    <script src="{% static 'js/shared/notifications.js' %}"></script>
</body>
</html>
